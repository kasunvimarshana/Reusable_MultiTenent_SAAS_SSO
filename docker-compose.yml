version: '3.8'

services:
  # ─── Databases ───────────────────────────────────────────────────────────────
  mysql-auth:
    image: mysql:8.0
    container_name: saas_mysql_auth
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: auth_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_auth_data:/var/lib/mysql
    networks:
      - saas_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  mysql-user:
    image: mysql:8.0
    container_name: saas_mysql_user
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: user_db
      MYSQL_USER: user_user
      MYSQL_PASSWORD: user_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_user_data:/var/lib/mysql
    networks:
      - saas_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  mysql-product:
    image: mysql:8.0
    container_name: saas_mysql_product
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: product_db
      MYSQL_USER: product_user
      MYSQL_PASSWORD: product_pass
    ports:
      - "3308:3306"
    volumes:
      - mysql_product_data:/var/lib/mysql
    networks:
      - saas_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  mysql-inventory:
    image: mysql:8.0
    container_name: saas_mysql_inventory
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventory_db
      MYSQL_USER: inventory_user
      MYSQL_PASSWORD: inventory_pass
    ports:
      - "3309:3306"
    volumes:
      - mysql_inventory_data:/var/lib/mysql
    networks:
      - saas_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  mysql-order:
    image: mysql:8.0
    container_name: saas_mysql_order
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: order_db
      MYSQL_USER: order_user
      MYSQL_PASSWORD: order_pass
    ports:
      - "3310:3306"
    volumes:
      - mysql_order_data:/var/lib/mysql
    networks:
      - saas_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: saas_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - saas_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5

  # ─── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: saas_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: saas_user
      RABBITMQ_DEFAULT_PASS: saas_pass
      RABBITMQ_DEFAULT_VHOST: saas_vhost
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - saas_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      timeout: 30s
      retries: 10

  # ─── Microservices ────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: saas_auth_service
    ports:
      - "8001:8000"
    environment:
      - APP_ENV=local
      - APP_KEY=base64:your-auth-service-key-here
      - DB_HOST=mysql-auth
      - DB_DATABASE=auth_db
      - DB_USERNAME=auth_user
      - DB_PASSWORD=auth_pass
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=saas_user
      - RABBITMQ_PASSWORD=saas_pass
      - RABBITMQ_VHOST=saas_vhost
    depends_on:
      mysql-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - saas_network
    volumes:
      - ./backend/auth-service:/var/www/html
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      timeout: 10s
      retries: 5

  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: saas_user_service
    ports:
      - "8002:8000"
    environment:
      - APP_ENV=local
      - APP_KEY=base64:your-user-service-key-here
      - DB_HOST=mysql-user
      - DB_DATABASE=user_db
      - DB_USERNAME=user_user
      - DB_PASSWORD=user_pass
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=saas_user
      - RABBITMQ_PASSWORD=saas_pass
      - RABBITMQ_VHOST=saas_vhost
      - AUTH_SERVICE_URL=http://auth-service:8000
    depends_on:
      mysql-user:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - saas_network
    volumes:
      - ./backend/user-service:/var/www/html

  product-service:
    build:
      context: ./backend/product-service
      dockerfile: Dockerfile
    container_name: saas_product_service
    ports:
      - "8003:8000"
    environment:
      - APP_ENV=local
      - APP_KEY=base64:your-product-service-key-here
      - DB_HOST=mysql-product
      - DB_DATABASE=product_db
      - DB_USERNAME=product_user
      - DB_PASSWORD=product_pass
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=saas_user
      - RABBITMQ_PASSWORD=saas_pass
      - RABBITMQ_VHOST=saas_vhost
      - AUTH_SERVICE_URL=http://auth-service:8000
      - INVENTORY_SERVICE_URL=http://inventory-service:8000
    depends_on:
      mysql-product:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - saas_network
    volumes:
      - ./backend/product-service:/var/www/html

  inventory-service:
    build:
      context: ./backend/inventory-service
      dockerfile: Dockerfile
    container_name: saas_inventory_service
    ports:
      - "8004:8000"
    environment:
      - APP_ENV=local
      - APP_KEY=base64:your-inventory-service-key-here
      - DB_HOST=mysql-inventory
      - DB_DATABASE=inventory_db
      - DB_USERNAME=inventory_user
      - DB_PASSWORD=inventory_pass
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=saas_user
      - RABBITMQ_PASSWORD=saas_pass
      - RABBITMQ_VHOST=saas_vhost
      - AUTH_SERVICE_URL=http://auth-service:8000
      - PRODUCT_SERVICE_URL=http://product-service:8000
    depends_on:
      mysql-inventory:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - saas_network
    volumes:
      - ./backend/inventory-service:/var/www/html

  order-service:
    build:
      context: ./backend/order-service
      dockerfile: Dockerfile
    container_name: saas_order_service
    ports:
      - "8005:8000"
    environment:
      - APP_ENV=local
      - APP_KEY=base64:your-order-service-key-here
      - DB_HOST=mysql-order
      - DB_DATABASE=order_db
      - DB_USERNAME=order_user
      - DB_PASSWORD=order_pass
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=saas_user
      - RABBITMQ_PASSWORD=saas_pass
      - RABBITMQ_VHOST=saas_vhost
      - AUTH_SERVICE_URL=http://auth-service:8000
      - INVENTORY_SERVICE_URL=http://inventory-service:8000
      - PRODUCT_SERVICE_URL=http://product-service:8000
    depends_on:
      mysql-order:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
    networks:
      - saas_network
    volumes:
      - ./backend/order-service:/var/www/html

networks:
  saas_network:
    driver: bridge

volumes:
  mysql_auth_data:
  mysql_user_data:
  mysql_product_data:
  mysql_inventory_data:
  mysql_order_data:
  redis_data:
  rabbitmq_data:
